<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Single Direct Dribbble Review 07</title>
    <style>
      body { margin: 0; font-family: Inter, "Segoe UI", sans-serif; background: #eef2f8; color: #162033; }
      .shell { max-width: 1080px; margin: 0 auto; padding: 28px 24px 56px; }
      .eyebrow { display: inline-block; padding: 10px 14px; border-radius: 999px; background: rgba(61,107,242,0.1); color: #3d6bf2; font-size: 12px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; }
      h1 { margin: 14px 0 10px; font-size: 40px; line-height: 1; letter-spacing: -0.04em; }
      p { margin: 0; color: #68758c; line-height: 1.6; }
      .card { margin-top: 24px; background: #fff; border: 1px solid rgba(20,28,48,.08); border-radius: 28px; box-shadow: 0 24px 60px rgba(31,49,86,.08); overflow: hidden; }
      .card img { display: block; width: 100%; height: auto; }
      .meta { padding: 18px 20px 22px; }
      .meta h2 { margin: 0 0 8px; font-size: 22px; letter-spacing: -0.03em; }
      code { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    </style>
  </head>
  <body>
    <div class="shell">
      <div class="eyebrow">Direct Dribbble Asset</div>
      <h1>Clean direct image / mobile settings UI.</h1>
      <p>Local raw image downloaded from a Dribbble CDN asset URL and placed in a plain HTML page.</p>
      <article class="card">
        <img src="./manual-direct-dribbble-03.jpg" alt="Mobile Settings UI" />
        <div class="meta">
          <h2>Mobile Settings UI Design</h2>
          <p>Source file: <code>manual-direct-dribbble-03.jpg</code></p>
        </div>
      </article>
    </div>
  </body>
</html>
