services:
  - type: web
    name: neural-rank-backend
    runtime: node
    plan: free
    repo: https://github.com/mughalhazy/Neural-Rank
    branch: main
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    healthCheckPath: /v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SERP_PROVIDER
        sync: false
      - key: SERP_API_KEY
        sync: false
      - key: RENDERER_ENDPOINT
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: ALLOWED_ORIGIN
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: MODULE_TIMEOUT_MS
        sync: false
      - key: GSC_ACCESS_TOKEN
        sync: false
      - key: GSC_SITE_URL
        sync: false
      - key: GA4_ACCESS_TOKEN
        sync: false
      - key: GA4_PROPERTY_ID
        sync: false
      - key: PAGESPEED_API_KEY
        sync: false
      - key: BACKLINK_PROVIDER
        sync: false
      - key: BACKLINK_API_KEY
        sync: false
      - key: BACKLINK_TARGET
        sync: false
