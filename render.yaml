services:
  - type: web
    name: neural-rank-backend
    runtime: node
    plan: free
    repo: https://github.com/mughalhazy/Neural-Rank
    branch: main
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
