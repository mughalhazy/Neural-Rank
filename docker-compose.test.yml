version: "3.9"

services:
  postgres-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: neural_rank_test
      POSTGRES_PASSWORD: test_password
      POSTGRES_DB: neural_rank_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neural_rank_test"]
      interval: 5s
      timeout: 5s
      retries: 5
